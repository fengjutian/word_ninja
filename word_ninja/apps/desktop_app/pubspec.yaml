name: desktop_app
description: Word Ninja Desktop App (Windows/macOS/Linux)
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  phosphor_flutter:
    git:
      url: https://github.com/subarnaPdl/phosphor_icons.git
      ref: main
  flutter:
    sdk: flutter
  fluent_ui: ^4.16.0
  core:
    path: ../../packages/core
  ui_kit:
    path: ../../packages/ui_kit
  auth:
    path: ../../packages/auth
  vocabulary:
    path: ../../packages/vocabulary
  reading:
    path: ../../packages/reading
  listening:
    path: ../../packages/listening
  ai:
    path: ../../packages/ai
  ai_tutor:
    path: ../../packages/ai_tutor
  profile:
    path: ../../packages/profile
  writing:
    path: ../../packages/writing
  study_plan:
    path: ../../packages/study_plan
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  window_manager: ^0.4.3
  hotkey_manager: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
