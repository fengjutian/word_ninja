name: mobile_app
description: Word Ninja Mobile App (Android/iOS)
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  phosphor_flutter:
    git:
      url: https://github.com/subarnaPdl/phosphor_icons.git
      ref: main
  flutter:
    sdk: flutter
  core:
    path: ../../packages/core
  ui_kit:
    path: ../../packages/ui_kit
  auth:
    path: ../../packages/auth
  vocabulary:
    path: ../../packages/vocabulary
  reading:
    path: ../../packages/reading
  ai:
    path: ../../packages/ai
  ai_tutor:
    path: ../../packages/ai_tutor
  listening:
    path: ../../packages/listening
  speaking:
    path: ../../packages/speaking
  writing:
    path: ../../packages/writing
  study_plan:
    path: ../../packages/study_plan
  achievement:
    path: ../../packages/achievement
  shop:
    path: ../../packages/shop
  leaderboard:
    path: ../../packages/leaderboard
  profile:
    path: ../../packages/profile
  sync:
    path: ../../packages/sync
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.0.16
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
